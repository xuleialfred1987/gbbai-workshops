<!DOCTYPE html>
<html lang="en-US">
  <head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GBB/AI Platform Interface">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="./manifest.json">
